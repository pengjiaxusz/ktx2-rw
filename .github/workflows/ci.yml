---
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: >
            ${{ runner.os }}-cargo-build-target-
            ${{ hashFiles('**/Cargo.lock') }}-
            ${{ hashFiles('.cargo/config.toml') }}

      - name: Install libc++ (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Build examples
        run: cargo build --examples --verbose --target ${{ matrix.target }}

  cross-compilation:
    name: Cross-compile to ${{ matrix.target }}
    strategy:
      matrix:
        include:

          # macOS targets
          - os: macos-latest
            target: aarch64-apple-darwin

          # iOS targets (from macOS)
          - os: macos-latest
            target: aarch64-apple-ios
          - os: macos-latest
            target: aarch64-apple-ios-sim
          - os: macos-latest
            target: x86_64-apple-ios

          # Windows from macOS (cross-compilation test)
          - os: macos-latest
            target: x86_64-pc-windows-gnu

          # Windows native GNU (alternative to MSVC)
          - os: windows-latest
            target: x86_64-pc-windows-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}


      - name: Install libc++ (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Install MinGW toolchain (Windows)
        if: >
          matrix.target == 'x86_64-pc-windows-gnu' &&
          matrix.os == 'windows-latest'
        run: |
          choco install mingw

      - name: Install MinGW toolchain (macOS cross-compilation)
        if: >
          matrix.target == 'x86_64-pc-windows-gnu' &&
          matrix.os == 'macos-latest'
        run: |
          brew install mingw-w64

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            ${{ matrix.os }}-cargo-${{ matrix.target }}-
            ${{ hashFiles('**/Cargo.lock') }}-
            ${{ hashFiles('.cargo/config.toml') }}

      - name: Build for target
        run: cargo build --target ${{ matrix.target }} --release

      - name: Build examples for target
        run: cargo build --target ${{ matrix.target }} --release --examples

      - name: Verify static linking (Windows GNU)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          # Find the built executable and check its dependencies
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            # Cross-compilation from macOS - check DLL dependencies
            find target/${{ matrix.target }}/release -name "*.exe" -exec x86_64-w64-mingw32-objdump -p {} \; | grep "DLL Name" | grep -E "(libgcc|libstdc|libwinpthread)" && exit 1 || echo "✅ No problematic MinGW DLL dependencies found"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Native Windows build - use dumpbin if available, otherwise skip detailed check
            echo "✅ Windows native build completed successfully"
          fi

  android:
    name: Android ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            android-cargo-${{ matrix.target }}-
            ${{ hashFiles('**/Cargo.lock') }}-
            ${{ hashFiles('.cargo/config.toml') }}

      - name: Build for Android
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo build --target ${{ matrix.target }} --release

  musl:
    name: Test on x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    container: alpine:3.19

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            curl \
            bash \
            build-base \
            musl-dev \
            cmake \
            pkgconfig \
            openssl-dev \
            openssl-libs-static \
            llvm17-dev \
            clang17 \
            clang17-libs \
            ca-certificates

      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source ~/.cargo/env
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            musl-cargo-${{ hashFiles('**/Cargo.lock') }}-
            ${{ hashFiles('.cargo/config.toml') }}

      - name: Build
        env:
          LIBCLANG_PATH: /usr/lib
        run: |
          source ~/.cargo/env
          cargo build --target x86_64-unknown-linux-musl --release

      - name: Run tests
        env:
          LIBCLANG_PATH: /usr/lib
        run: |
          source ~/.cargo/env
          cargo test --target x86_64-unknown-linux-musl --release

      - name: Build examples
        env:
          LIBCLANG_PATH: /usr/lib
        run: |
          source ~/.cargo/env
          cargo build --target x86_64-unknown-linux-musl --release --examples
