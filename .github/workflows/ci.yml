---
name: CI

"on":
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test on ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: >
            ${{ runner.os }}-cargo-build-target-
            ${{ hashFiles('**/Cargo.lock') }}

      - name: Install libc++ (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --verbose --target ${{ matrix.target }}

      - name: Build examples
        run: cargo build --examples --verbose --target ${{ matrix.target }}

  cross-compilation:
    name: Cross-compile to ${{ matrix.target }}
    strategy:
      matrix:
        include:

          # macOS targets
          - os: macos-latest
            target: aarch64-apple-darwin

          # iOS targets (from macOS)
          - os: macos-latest
            target: aarch64-apple-ios
          - os: macos-latest
            target: aarch64-apple-ios-sim
          - os: macos-latest
            target: x86_64-apple-ios


    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}


      - name: Install libc++ (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libc++-dev libc++abi-dev


      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            ${{ matrix.os }}-cargo-${{ matrix.target }}-
            ${{ hashFiles('**/Cargo.lock') }}

      - name: Build for target
        run: cargo build --target ${{ matrix.target }} --release

      - name: Build examples for target
        run: cargo build --target ${{ matrix.target }} --release --examples


  android:
    name: Android ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: false

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            android-cargo-${{ matrix.target }}-
            ${{ hashFiles('**/Cargo.lock') }}

      - name: Build for Android
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: cargo build --target ${{ matrix.target }} --release

  musl:
    name: Test on x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    container: messense/rust-musl-cross:x86_64-musl

    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y libclang-dev pkg-config libssl-dev musl-dev musl-tools

      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: >
            musl-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --target x86_64-unknown-linux-musl --release

      - name: Run tests
        run: cargo test --target x86_64-unknown-linux-musl --release

      - name: Build examples
        run: cargo build --target x86_64-unknown-linux-musl --release --examples
