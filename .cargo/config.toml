# Note: This configuration is only applied when building this crate directly,
# not when used as a dependency. When used as a dependency, the build.rs
# handles linking appropriately via cargo:rustc-link-lib directives.
[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
    "-C", "link-arg=-lkernel32",
    "-C", "link-arg=-luser32",
    "-C", "link-arg=-lgdi32",
    "-C", "link-arg=-ladvapi32",
]

[target.x86_64-unknown-linux-musl]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
    "-C", "link-arg=-Wl,--gc-sections",
]